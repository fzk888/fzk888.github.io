baseURL = 'https://fzk888.github.io/'
languageCode = 'zh-cn'
title = '泽铠的博客'
theme = 'PaperMod'

[params]
  env = "production"
  description = "记录技术、生活与思考"
  author = "泽铠"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/fzk888"
  
  [[params.socialIcons]]
    name = "email"
    url = "mailto:your-email@example.com"

  # 首页个人信息
  [params.profileMode]
    enabled = true
    title = "泽凯的博客"
    subtitle = "记录技术、生活与思考"
    imageUrl = "https://ui-avatars.com/api/?name=泽铠&background=0D8ABC&color=fff&size=256"
    imageWidth = 150
    imageHeight = 150
    imageTitle = "泽铠"
    
    # 首页按钮
    [[params.profileMode.buttons]]
      name = "文章"
      url = "posts"
    
    [[params.profileMode.buttons]]
      name = "关于"
      url = "about"

# 菜单配置
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "diary"
  name = "碎碎念"
  url = "/diary/"
  weight = 2

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 3

# 构建配置
[build]
  writeStats = true

# 输出配置
[outputs]
  home = ["HTML", "RSS", "JSON"]

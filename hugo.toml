baseURL = 'https://fzk888.github.io/'
languageCode = 'zh-cn'
title = '泽铠的博客'
theme = 'PaperMod'

[params]
  env = "production"
  description = "记录技术、生活与思考"
  author = "泽铠"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/fzk888"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your-email@example.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # 首页 Profile 模式
  [params.profileMode]
    enabled = true
    title = "泽铠的博客"
    subtitle = "记录技术、生活与思考"
    imageUrl = "https://ui-avatars.com/api/?name=ZK&background=667eea&color=fff&size=256&bold=true&font-size=0.4"
    imageWidth = 150
    imageHeight = 150
    imageTitle = "泽铠"

    [[params.profileMode.buttons]]
      name = "文章"
      url = "posts"

    [[params.profileMode.buttons]]
      name = "关于"
      url = "about"

  # 搜索配置
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 菜单
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "diary"
  name = "碎碎念"
  url = "/diary/"
  weight = 2

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 3

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 4

# 构建
[build]
  writeStats = true

# 输出
[outputs]
  home = ["HTML", "RSS", "JSON"]

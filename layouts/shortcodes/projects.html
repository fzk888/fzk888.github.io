<div class="project-grid">
{{ range .Params.projects }}
<div class="project-card">
    <div class="project-card__title">{{ .title }}</div>
    <div class="project-card__desc">{{ .desc | markdownify }}</div>
    <div class="project-card__tags">
        {{ range .tags }}<span class="project-card__tag">{{ . }}</span>{{ end }}
    </div>
    {{ with .url }}<a class="project-card__link" href="{{ . }}" target="_blank" rel="noopener">查看项目 →</a>{{ end }}
</div>
{{ end }}
</div>
